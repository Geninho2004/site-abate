<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CGVeículos - Abate de Veículos e Gestão Automóvel</title>

<meta
  name="description"
  content="Centro de Gestão de Veículos em Fim de Vida. Pedido de abate automóvel, recolha de veículos, tratamos da documentação, 
  recolha e pagamento imediato. Serviço rápido em Portugal e veículos estrangeiros. Apoio ao incentivo na compra de carros elétricos."
/>
  </head>

  <meta name="keywords" content="abate de veículos, veículos em fim de vida, abate automóvel, recolha de carros, sucata automóvel, veículos estrangeiros" />

<meta name="author" content="CGVeículos" />
  <body>

    <!-- FORMULÁRIO NETLIFY -->
    <form
      name="pedido-abate"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
      enctype="multipart/form-data"
    >
      <input type="hidden" name="form-name" value="pedido-abate" />

      <input type="text" name="nome" />
      <input type="text" name="telefone" />
      <input type="text" name="veiculo" />
      <textarea name="descricao"></textarea>
      <input type="file" name="fotos" multiple />
    </form>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
